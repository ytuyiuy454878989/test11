#CI项目
name: Release WRT

# #CI计划
# on:
#   #自动编译：当Auto-Clean运行完成后
#   workflow_run:
#     # workflows: ["Auto-Clean"]
#     # types:
#     #   - completed
#     schedule:
#       - cron: '0 3 * * 1' # 每周一构建一次 (例如，每周一凌晨3点)
on:
  # #自动清理：每天早上6点
  schedule:
    # 每周一构建一次 (例如，每周一凌晨3点)
    - cron: 0 22 * * *


  #手动编译
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - aliyun_ap8220_libwrt
          - cmcc_rax3000m_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - n1_immwrt
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt

#CI权限
permissions: write-all

#CI任务
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:

      # - name: Checkout Projects
      #   uses: actions/checkout@main

      - name: Check Server Performance(检查服务器性能)
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息："
          echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

      - name: Free Disk Space(清理磁盘空间)
        uses: endersonmenezes/free-disk-space@v3  # Use @main for latest, @v3 for stable
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rm"  # Use 'rmz' for faster deletion (default: 'rm')
          rmz_version: "3.1.1"  # Required when rm_cmd is 'rmz'
          testing: false

      # - name: Free Disk Space (清理磁盘空间Ubuntu)
      #   uses: jlumbroso/free-disk-space@main
      #   with:
      #     # this might remove tools that are actually needed,
      #     # if set to "true" but frees about 6 GB
      #     tool-cache: false
          
      #     # all of these default to true, but feel free to set to
      #     # "false" if necessary for your workflow
      #     android: true
      #     dotnet: true
      #     haskell: true
      #     large-packages: true
      #     docker-images: true
      #     swap-storage: true


      - name: Build System Setup(安装依赖环境)
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload



      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set Build Date and Timezone
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          export BUILD_SRC=$(awk -F"=" '/REPO_URL/ {print $NF}' "./wrt_core/compilecfg/${{ inputs.model }}.ini")
          echo "BUILD_SRC=$BUILD_SRC" >> $GITHUB_ENV
    
         
      - name: Pre Clone
        run: |
          for script in $(find . -name "*.sh"); do
            chmod +x "$script"
          done
          ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir
          key: ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}-

      - name: Check Scripts
        run: |
          find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

      - name: Check Caches(将所有的rxt sh后缀文件全部赋予执行权限)
        id: check-cache
        if: env.WRT_TEST != 'true'
        uses: actions/cache@main
        with:
          key: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}-${{env.WRT_HASH}}
          restore-keys: ${{env.WRT_CONFIG}}-${{env.WRT_INFO}}
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host*
            ./wrt/staging_dir/tool*

      - name: Refresh the cache(更新缓存)
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware(编译固件)
        run: ./build.sh ${{ inputs.model }}
          
      - name: Get Kernel Verion
        run: |
          # 获取内核版本
          echo "KVER=$(grep -oP "^kernel.*" ./firmware/*.manifest | grep -oP "[4-6]\.[0-9]{1,3}\.[0-9]{1,3}")" >> $GITHUB_ENV

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ hashFiles('**/repo_flag') }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information (Post-build)(机器信息)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Package OpenWrt Firmware(打包固件)
        if: ${{ inputs.model == 'n1_immwrt' }}
        uses: unifreq/openwrt_packit@8007d3efd49bb42aa20c5755a50af21dc7a438e1
        env:
          OPENWRT_ARMVIRT: firmware/*.tar.gz
          PACKAGE_SOC: s905d
          KERNEL_VERSION_NAME: 6.6.y
          WHOAMI: YooY

      - name: Prepare Release Body
        run: |
          echo "云编译发布" > release_body.txt
          echo "源码：${{ env.BUILD_SRC }}" >> release_body.txt
          echo "Kernel: ${{ env.KVER }}" >> release_body.txt
          echo "WIFI密码: 12345678" >> release_body.txt
          echo "LAN地址: 192.168.1.1" >> release_body.txt
          echo "插件：" >> release_body.txt
          echo "$(grep -oP "luci-app(-[a-zA-Z0-9]{1,}){1,}" ./firmware/*.manifest | awk -F":" '{print $NF}')"  >> release_body.txt

      - name: Release Firmware(发布固件)
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          files: ${{ inputs.model == 'n1_immwrt' && env.PACKAGED_OUTPUTPATH || './firmware' }}/*.*
          body_path: ./release_body.txt

      - name: Post-clean Disk Space
        if: always()
        run: |
          # 构建完成后清理大体积中间产物，释放空间给后续任务
          rm -rf ./action_build/build_dir 2>/dev/null || true
          rm -rf ./action_build/dl 2>/dev/null || true
          sudo apt-get clean -y 2>/dev/null || true
          echo "===== Disk Status After Post-clean ====="
          df -hT
